<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Online Nursery</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-container {
            max-width: 1200px;
            margin: 8rem auto 2rem;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .cart-item {
            display: grid;
            grid-template-columns: 100px 2fr 1fr 1fr auto;
            align-items: center;
            padding: 20px;
            margin-bottom: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            gap: 20px;
        }
        
        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .item-details h3 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 5px;
        }
        
        .item-details .price {
            font-size: 1.6rem;
            color: #4CAF50;
            font-weight: bold;
        }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quantity-controls button {
            background: #4CAF50;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.6rem;
            transition: background-color 0.3s;
        }
        
        .quantity-controls button:hover {
            background: #45a049;
        }
        
        .quantity-controls span {
            font-size: 1.6rem;
            min-width: 30px;
            text-align: center;
        }
        
        .item-total {
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
        }
        
        .remove-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .remove-btn:hover {
            background: #cc0000;
        }
        
        .cart-summary {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: right;
        }
        
        .cart-summary h2 {
            font-size: 2.4rem;
            color: #333;
            margin-bottom: 15px;
        }
        
        #cart-total {
            font-size: 2rem;
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .checkout-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 4px;
            font-size: 1.8rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .checkout-btn:hover {
            background: #45a049;
        }

        .empty-cart-message {
            text-align: center;
            padding: 40px;
            font-size: 2rem;
            color: #666;
        }

        .continue-shopping {
            display: inline-block;
            margin-top: 20px;
            color: #4CAF50;
            text-decoration: none;
            font-size: 1.6rem;
        }

        .continue-shopping i {
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            .cart-item {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .cart-item img {
                margin: 0 auto;
            }
            
            .quantity-controls {
                justify-content: center;
                margin: 10px 0;
            }
        }

        .checkout-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .checkout-container h2 {
            color: #333;
            font-size: 2.4rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-size: 1.6rem;
            color: #333;
        }

        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1.2rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1.4rem;
            transition: border-color 0.3s;
        }

        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #4CAF50;
            outline: none;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        #checkout-form .checkout-btn {
            width: 100%;
            margin-top: 1rem;
        }

        .checkout-title {
            color: #333;
            font-size: 2.4rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .checkout-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: right;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .summary-item span {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .summary-item total {
            font-size: 1.8rem;
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <input type="checkbox" name="" id="toggler">
        <label for="toggler" class="fas fa-bars"></label>
        
        <a href="/" class="logo">Online Nursery<span>.</span></a>
        
        <nav class="navbar">
            <a href="/index.html#home">Home</a>
            <a href="/index.html#about">About</a>
            <a href="/product.html">Shop</a>
            <a href="/orders.html">Orders</a>
            <a href="/index.html#contact">Contact</a>
        </nav>

        <div class="icons">
            <a href="wishlist.html" class="fas fa-heart" id="search-btn"></a>
            <a href="profile.html" class="fas fa-user" id="login-btn"></a>
            <a href="cart.html" class="fas fa-shopping-cart" id="cart-btn"></a>
        </div>
    </header>

    <!-- Cart Content -->
    <div class="cart-container">
        <h1 class="heading">Shopping <span>Cart</span></h1>
        
        <div id="cart-items">
            <!-- Cart items will be loaded here -->
        </div>

        <div class="cart-summary">
            <h2>Cart Summary</h2>
            <p id="cart-total">Total: ₹0</p>
            <button onclick="checkout()" class="checkout-btn">
                <i class=""></i> Proceed to Checkout
            </button>
            <br>
            <a href="/product" class="continue-shopping">
                <i class="fas fa-arrow-left"></i> Continue Shopping
            </a>
        </div>

        <div id="checkout-form" style="display: none;" class="checkout-container">
            <h2 class="checkout-title">Checkout Details</h2>
            <form id="order-form" class="checkout-form">
                <div class="form-group">
                    <label for="customer-name">Full Name</label>
                    <input type="text" id="customer-name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="customer-phone">Phone Number</label>
                    <input type="tel" id="customer-phone" required placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="shipping-address">Shipping Address</label>
                    <textarea id="shipping-address" required placeholder="Enter your complete delivery address"></textarea>
                </div>

                <div class="form-group">
                    <label for="payment-method">Payment Method</label>
                    <select id="payment-method" required>
                        <option value="" disabled selected>Select payment method</option>
                        <option value="cod">Cash on Delivery</option>
                        <option value="card">Credit/Debit Card</option>
                        <option value="upi">UPI</option>
                    </select>
                </div>

                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-item total">
                        <span>Total Amount:</span>
                        <span id="checkout-total">₹0</span>
                    </div>
                </div>

                <button type="button" class="checkout-btn" onclick="placeOrder(event)">
                    <i class=""></i> Place Order
                </button>
            </form>
        </div>
    </div>

    <script src="/cart.js"></script>
    <script src="/wishlist.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartDisplay();
            updateCartCount();
            updateWishlistCount();

            // Add form submit handler
            document.getElementById('order-form').addEventListener('submit', placeOrder);
        });

        // Check if user is logged in
        document.addEventListener('DOMContentLoaded', function() {
            const token = sessionStorage.getItem('token');
            if (!token) {
                // Clear cart/wishlist data if not logged in
                localStorage.removeItem('cart');
                localStorage.removeItem('cartCount');
                localStorage.removeItem('wishlist');
                localStorage.removeItem('wishlistCount');
                
                // Redirect to login page
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
